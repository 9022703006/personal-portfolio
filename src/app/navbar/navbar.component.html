<nav
    class="fixed top-0 w-full z-50 bg-[#0a0a0a]/80 backdrop-blur-md border-b border-white/5 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">

        <div class="text-xl font-bold tracking-tighter cursor-pointer group" (click)="scrollTo('home')">
            <span class="text-indigo-500 group-hover:text-white transition-colors">Prathmesh</span>
            <span class="text-gray-100">.dev</span>
        </div>

        <div class="hidden md:flex items-center space-x-8">
            <a *ngFor="let link of navLinks" (click)="scrollTo(link.target)"
                class="cursor-pointer text-sm font-medium transition-all duration-300 relative group"
                [ngClass]="activeSection === link.target ? 'text-indigo-400' : 'text-gray-400 hover:text-white'">
                {{ link.name }}
                <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-indigo-500 transition-all duration-300"
                    [ngClass]="{'w-full': activeSection === link.target}"></span>
            </a>
            <button (click)="scrollTo('contact')"
                class="px-5 py-2 rounded-full border border-indigo-500/50 text-indigo-400 text-sm hover:bg-indigo-500 hover:text-white transition-all">
                Hire Me
            </button>
        </div>

        <div class="md:hidden">
            <button (click)="toggleMenu()" class="text-gray-400 hover:text-white focus:outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path *ngIf="!isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6h16M4 12h16m-7 6h7" />
                    <path *ngIf="isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </div>

    <div *ngIf="isMenuOpen"
        class="md:hidden absolute top-20 left-0 w-full bg-[#0a0a0a] border-b border-white/5 animate-in slide-in-from-top duration-300">
        <div class="flex flex-col p-6 space-y-4">
            <a *ngFor="let link of navLinks" (click)="scrollTo(link.target)"
                class="text-lg font-medium py-2 transition-colors"
                [ngClass]="activeSection === link.target ? 'text-indigo-500' : 'text-gray-400'">
                {{ link.name }}
            </a>
        </div>
    </div>
</nav>
