<section class="min-h-screen bg-[#0a0a0a] text-white py-20 px-6">
    <div class="max-w-4xl mx-auto">

        <div class="mb-16">
            <h2 class="text-4xl md:text-5xl font-bold tracking-tight">
                <span class="text-indigo-500">Education</span> Information
            </h2>
            <div class="h-1 w-20 bg-indigo-500 mt-4 rounded-full"></div>
        </div>

        <div class="relative border-l border-gray-800 ml-4 md:ml-8">

            <div *ngFor="let edu of educationList; let i = index" class="mb-12 ml-8 group">

                <div
                    class="absolute -left-[9px] mt-1.5 h-4 w-4 rounded-full border-2 border-indigo-500 bg-[#0a0a0a] group-hover:bg-indigo-500 transition-all duration-300 shadow-[0_0_10px_rgba(99,102,241,0.5)]">
                </div>

                <div
                    class="bg-white/5 border border-white/10 p-6 rounded-2xl backdrop-blur-sm hover:border-indigo-500/50 transition-all duration-500 transform hover:-translate-y-1">
                    <span class="text-indigo-400 text-sm font-mono font-medium">{{ edu.period }}</span>

                    <h3 class="text-xl md:text-2xl font-bold mt-2 text-gray-100">
                        {{ edu.degree }}
                    </h3>

                    <p class="text-gray-400 font-medium mt-1">
                        {{ edu.institution }}
                    </p>

                    <p class="text-gray-500 text-sm mt-4 leading-relaxed max-w-2xl">
                        {{ edu.description }}
                    </p>
                </div>

            </div>
        </div>

    </div>
</section>
